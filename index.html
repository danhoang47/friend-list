<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friend List</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/group.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/modal.css">
</head>

<body>
  <header>
    <h1>Friend List</h1>
    <div class="header-actions">
      <button id="add-group" class="btn-add">+ New Group</button>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search" placeholder="Search friends...">
      </div>
    </div>
  </header>
  <main></main>
  <dialog id="create-modal">
    <h3>Create New Group</h3>
    <input type="text" id="group-name-input" placeholder="Enter group name...">
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-cancel">Cancel</button>
      <button id="modal-create" class="btn-create">Create</button>
    </div>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>

</html>
